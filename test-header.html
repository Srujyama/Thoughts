<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Header layout test</title>
  <!-- Real app stylesheet -->
  <link rel="stylesheet" href="/src/style.css" />
  <style>
    /* Just so the body has the app background while we test the header in isolation */
    body { margin: 0; }
    .test-banner { font-family: monospace; padding: 6px 12px; background:#222; color:#0f0; }
  </style>
</head>
<body data-theme="typewriter">
  <div class="test-banner" id="banner">Header layout test — resize to test breakpoints</div>
  <div class="app-shell">
    <header class="app-header">
      <div class="header-left">
        <button class="mobile-hamburger" id="mobile-menu-btn" title="Menu" aria-label="Open folder menu">
          <span></span><span></span><span></span>
        </button>
        <button class="breadcrumb-back-btn" id="breadcrumb-back" title="Back" aria-label="Back">&larr;</button>
        <button class="app-logo-btn" id="go-home" title="Home">
          <h1 class="app-title small" data-text="Thoughts">Thoughts</h1>
        </button>
        <nav class="breadcrumb" id="breadcrumb"><span class="breadcrumb-item">Folders</span></nav>
      </div>
      <div class="header-right">
        <button class="sync-status-btn" id="sync-status-btn" title="Sync status">
          <span class="sync-dot sync-ok" id="sync-dot"></span>
          <span class="sync-label" id="sync-label">Synced</span>
        </button>
        <div class="header-actions-desktop">
          <button class="header-icon-btn" id="graph-view-btn" title="Graph view">&#9672;</button>
          <button class="header-icon-btn" id="cmd-palette-btn" title="Command palette">&#8984;</button>
          <div class="theme-picker" id="theme-picker">
            <button class="theme-toggle-btn" id="theme-toggle-btn" title="Change theme">
              <span class="theme-toggle-swatch" data-theme="typewriter"></span>
              <span class="theme-toggle-label">Typewriter</span>
            </button>
            <div class="theme-dropdown" id="theme-dropdown"></div>
          </div>
          <button class="header-logout-btn" id="logout-btn" title="Log out">
            <span class="btn-text">LOG OUT</span>
          </button>
        </div>
        <div class="header-overflow" id="header-overflow">
          <button class="header-overflow-btn" id="header-overflow-btn" title="More" aria-label="More options">&#8942;</button>
          <div class="header-overflow-menu" id="header-overflow-menu">
            <button class="overflow-item" id="overflow-graph">Graph view</button>
            <button class="overflow-item" id="overflow-cmd">Command palette</button>
            <button class="overflow-item" id="overflow-theme">Theme</button>
            <button class="overflow-item" id="overflow-settings">Settings</button>
            <button class="overflow-item overflow-logout" id="overflow-logout">Log out</button>
          </div>
        </div>
      </div>
    </header>
    <div class="app-body" style="min-height:200px;">
      <main class="app-main" style="padding:1rem;font-family:monospace;">body</main>
    </div>
  </div>
  <script>
    // Toggle the overflow menu on click so we can test the mobile dropdown too.
    const ob = document.getElementById('header-overflow-btn');
    const om = document.getElementById('header-overflow-menu');
    ob.addEventListener('click', () => om.classList.toggle('open'));
    // Report computed layout for quick assertions.
    window.__layout = () => {
      const r = (sel) => { const el = document.querySelector(sel); if(!el) return null; const s = getComputedStyle(el); const b = el.getBoundingClientRect(); return {display:s.display, visibility:s.visibility, w:Math.round(b.width), h:Math.round(b.height), x:Math.round(b.x), y:Math.round(b.y)}; };
      return {
        width: window.innerWidth,
        actionsDesktop: r('.header-actions-desktop'),
        overflow: r('.header-overflow'),
        overflowBtn: r('.header-overflow-btn'),
        overflowMenu: r('.header-overflow-menu'),
        headerRight: r('.header-right'),
        logout: r('.header-logout-btn'),
        themeToggle: r('.theme-toggle-btn'),
      };
    };
  </script>
</body>
</html>
